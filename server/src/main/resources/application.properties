# ================= DATABASE =================
spring.datasource.url=jdbc:postgresql://localhost:5432/reservation_system
spring.datasource.username=postgres
spring.datasource.password=formentera
spring.datasource.driver-class-name=org.postgresql.Driver

# HikariCP Connection Pool
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# ================= JPA/HIBERNATE =================
server.port=13472
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ================= LOGGING =================
logging.level.root=INFO
logging.level.org.springframework=WARN
logging.level.org.hibernate=ERROR
logging.level.org.hibernate.SQL=ERROR
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=ERROR
logging.level.org.apache=WARN
logging.level.com.zaxxer=WARN
logging.level.org.hibernate.orm.deprecation=WARN
logging.level.org.hibernate.orm.jdbc.bind=OFF
logging.level.com.mycompany.reservationsystem.websocket=DEBUG
logging.level.com.mycompany.reservationsystem.config=DEBUG

